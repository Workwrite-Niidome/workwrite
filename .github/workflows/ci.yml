name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ultra_reader
          POSTGRES_PASSWORD: ultra_reader_dev
          POSTGRES_DB: ultra_reader_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ultra_reader:ultra_reader_dev@localhost:5432/ultra_reader_dev
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=@workwrite/backend

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run backend tests
        run: npm run test --workspace=@workwrite/backend
